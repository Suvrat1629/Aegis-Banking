global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Containerised app targets (used when running via docker compose up)
  - job_name: 'ledger-core'
    static_configs:
      - targets: ['aegis-ledger-core:2113']
    metrics_path: /metrics

  - job_name: 'gateway'
    static_configs:
      - targets: ['aegis-gateway:2112']
    metrics_path: /actuator/prometheus

  - job_name: 'ledger-core-local'
    static_configs:
      - targets: ['host.docker.internal:2113']
    metrics_path: /metrics

  - job_name: 'gateway-local'
    static_configs:
      - targets: ['host.docker.internal:2112']
    metrics_path: /actuator/prometheus

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['aegis-otel-collector:8888']
