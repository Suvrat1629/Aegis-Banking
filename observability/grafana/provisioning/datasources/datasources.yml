apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: false

  - name: Jaeger
    type: jaeger
    uid: jaeger-aegis
    access: proxy
    url: http://aegis-jaeger:16686
    isDefault: false
    version: 1
    editable: false

