input {
    rabbitmq {
        host => "rabbitmq"
        port => 5672
        user => "${RABBITMQ_USER}"
        password => "${RABBITMQ_PASSWORD}"
        queue => "audit_queue"
        durable => true
        codec => "json"
    }

  rabbitmq {
    host => "rabbitmq"
    port => 5672
    user => "${RABBITMQ_USER}"
    password => "${RABBITMQ_PASSWORD}"
    queue => "gateway_metadata"
    durable => true
    codec => "json"
  }
}

filter {
    mutate {
        add_field => {
      "log_source" => "aegis-audit-pipeline"
            "environment" => "development"
        }
    }

    date {
        match => ["timestamp", "ISO8601"]
    }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "aegis-audit-logs-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:-}"
    password => "${ELASTICSEARCH_PASSWORD:-}"
  }
  stdout { 
    codec => rubydebug 
  }
}

# Separate pipeline for gateway metadata (same input block above will add
# metadata using filters, but if you prefer a dedicated index you can add
# another output with a conditional here. For simplicity, messages from the
# gateway queue will currently flow through the same filters; to route them
# to a different index, add a conditional on [log_source] or [queue]
#+ example:
# output { if [log_source] == "aegis-gateway-pipeline" { elasticsearch { index => "aegis-gateway-metadata-%{+YYYY.MM.dd}" } } }
