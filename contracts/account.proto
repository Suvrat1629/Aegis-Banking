syntax = "proto3";
package account;
option java_package = "com.aegis.account.grpc";
option go_package = "github.com/aegis-banking/account-service/internal/pb/account;account";

service AccountService {
  rpc CreateAccount (CreateAccountRequest) returns (CreateAccountResponse);
  rpc GetAccount (GetAccountRequest) returns (GetAccountResponse);
}

message CreateAccountRequest {
  string owner_name = 1;
  string email      = 2;
  string phone      = 3;
}

message CreateAccountResponse {
  string account_id = 1;
  string owner_name = 2;
  string email      = 3;
  string phone      = 4;
}

message GetAccountRequest {
  string account_id = 1;
}

message GetAccountResponse {
  string account_id = 1;
  string owner_name = 2;
  string email      = 3;
  string phone      = 4;
}
