syntax = "proto3";
package ledger;
option java_package = "com.aegis.ledger.grpc";
option go_package = "github.com/aegis-banking/ledger-core/internal/pb;pb";

service LedgerService {
  rpc ExecuteTransfer (TransferRequest) returns (TransferResponse);
}

message TransferRequest {
  string transaction_id = 1; // Generated by Java Gateway
  string from_account    = 2;
  string to_account      = 3;
  double amount          = 4;
  string device_id       = 5; // Extra metadata
  string ip_address      = 6;
  string user_agent      = 7;
}

message TransferResponse {
  bool   success        = 1;
  string message        = 2;
  string transaction_id = 3;
}