syntax = "proto3";
package ledger;
option java_package = "com.aegis.ledger.grpc";
option go_package = "github.com/aegis-banking/ledger-core/internal/pb;pb";

service LedgerService {
  rpc ExecuteTransfer (TransferRequest) returns (TransferResponse);
  rpc GetAccountBalance (BalanceRequest) returns (BalanceResponse);
  rpc GetAccountHistory (HistoryRequest) returns (HistoryResponse);
  rpc RegisterAccount (RegisterAccountRequest) returns (RegisterAccountResponse);
}

message TransferRequest {
  string transaction_id  = 1;
  string from_account    = 2;
  string to_account      = 3;
  double amount          = 4;
  string device_id       = 5;
  string ip_address      = 6;
  string user_agent      = 7;
  // Set only on compensating reversals issued by fraud-service's saga; empty
  // for ordinary transfers. Lets downstream consumers (fraud-service itself,
  // for its loop guard) tell a reversal apart from the transfer it reverses.
  string reference_transaction_id = 8;
}

message TransferResponse {
  bool   success        = 1;
  string message        = 2;
  string transaction_id = 3;
}

message BalanceRequest {
  string account_id = 1;
}

message BalanceResponse {
  string account_id   = 1;
  string owner_name   = 2;
  double balance      = 3;
  string last_updated = 4;
}

message HistoryRequest {
  string account_id = 1;
  int32 limit       = 2;
  int32 offset      = 3;
}

message TransactionEntry {
  string transaction_id = 1;
  double amount         = 2;
  string entry_type     = 3;
  string description    = 4;
  string created_at     = 5;
}

message HistoryResponse {
  repeated TransactionEntry entries = 1;
}

message RegisterAccountRequest {
  string account_id = 1;
  string owner_name = 2;
}

message RegisterAccountResponse {
  bool   success = 1;
  string message = 2;
}